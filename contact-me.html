<section class="contact-section">
      <div class="contact-left">
        <p class="label">Contact me</p>
        <h2>Let's work<br />together</h2>

        <h3>Got a problem to solve?</h3>
        <p>
          Encourage people to contact you and describe what role you are
          interested in. Show that you will add value to their projects through
          your work.
        </p>

        <p>Need a Frontend developer? <a href="#">Let’s talk!</a></p>
      </div>

      <form class="contact-form">
        <div class="form-group">
          <label>What's your name?</label>
          <input type="text" placeholder="Your name goes here" />
        </div>

        <div class="form-group">
          <label>What's your email?</label>
          <input type="email" placeholder="youremail@email.com" />
        </div>

        <div class="form-group">
          <label>How can I help you?</label>
          <textarea placeholder="Hello Lukas, I am interested in..."></textarea>
        </div>

        <label class="checkbox">
          <input type="checkbox" />
          <span></span>
          I've read the <a href="#">privacy policy</a> and agree to the
          processing of my data as outlined.
        </label>

        <button type="submit">Say Hello ;)</button>
      </form>
    </section>
